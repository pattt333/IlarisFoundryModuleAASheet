name: Build and Publish Release

on:
    push:
        tags:
            - 'v*'

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'

            - name: Install dependencies
              run: npm install

            - name: Extract version from tag
              id: version
              run: |
                  VERSION="${{ github.ref_name }}"
                  VERSION="${VERSION#v}"
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Version: $VERSION"

            - name: Update module.json for release
              run: |
                  REPO_URL="https://github.com/${{ github.repository }}"
                  RELEASE_TAG="${{ github.ref_name }}"
                  DOWNLOAD_URL="$REPO_URL/releases/download/$RELEASE_TAG"

                  jq --arg manifest "$DOWNLOAD_URL/module.json" \
                     --arg download "$DOWNLOAD_URL/module.zip" \
                     --arg version "${{ steps.version.outputs.version }}" \
                     '.manifest = $manifest | .download = $download | .version = $version' \
                     module.json > module.json.tmp && mv module.json.tmp module.json

                  echo "module.json updated for release:"
                  echo "  version:  ${{ steps.version.outputs.version }}"
                  echo "  manifest: $DOWNLOAD_URL/module.json"
                  echo "  download: $DOWNLOAD_URL/module.zip"

            - name: Create module.zip (runtime files only)
              run: |
                  zip -r module.zip \
                    module.json \
                    module.js \
                    packs/ \
                    scripts/ \
                    styles/ \
                    templates/ \
                    assets/ \
                    -x "scripts/**/_spec/*" "scripts/**/_spec/**"

            - name: Create GitHub Release
              id: release
              uses: ncipollo/release-action@v1
              with:
                  tag: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  artifacts: 'module.json, module.zip'
                  body: |
                      ## Ilaris Alternative Actor Sheet v${{ steps.version.outputs.version }}

                      ### Installation

                      Install via Foundry VTT's package browser or use this manifest URL:

                      ```
                      https://github.com/${{ github.repository }}/releases/latest/download/module.json
                      ```

                      ### Changes

                      See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
                  draft: false
                  prerelease: false

            - name: Notify Foundry VTT Package Release API
              if: ${{ !env.ACT }}
              run: |
                  API_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://foundryvtt.com/_api/packages/release_version/" \
                    -H "Content-Type: application/json" \
                    -H "Authorization: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}" \
                    -d '{
                      "id": "ilaris-alternative-actor-sheet",
                      "release": {
                        "version": "${{ steps.version.outputs.version }}",
                        "manifest": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.json",
                        "notes": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
                        "compatibility": {
                          "minimum": "14",
                          "verified": "14",
                          "maximum": ""
                        }
                      }
                    }')

                  HTTP_CODE=$(echo "$API_RESPONSE" | tail -n1)
                  BODY=$(echo "$API_RESPONSE" | sed '$d')

                  echo "Foundry API response (HTTP $HTTP_CODE):"
                  echo "$BODY"

                  if [ "$HTTP_CODE" != "200" ]; then
                    echo "::warning::Foundry Package Release API returned HTTP $HTTP_CODE"
                  fi
              env:
                  FOUNDRY_RELEASE_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}

            - name: Bump version on main branch
              run: |
                  git checkout main
                  jq --arg version "${{ steps.version.outputs.version }}" \
                     '.version = $version' \
                     module.json > module.json.tmp && mv module.json.tmp module.json

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add module.json
                  git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]" || echo "No changes to commit"
                  git push origin main
